<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小熊超市 · 分类上架</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FEF6E8;--white:#FFFFFF;
  --red:#D94040;--red2:#B02E2E;
  --green:#2E9E6B;--blue:#3470C8;--purple:#6B44C8;
  --amber:#C87C1A;--teal:#1E8A80;--pink:#D43858;
  --wood:#B87830;--wood-dark:#7A4E18;--wood-shelf:#F0DEB8;
  --item:#E87830;--item-hi:#F0924A;
  --text:#1E1628;--soft:#7A6E80;--border:#E4DDF0;
  --sh:0 2px 12px rgba(0,0,0,.10);--sh-lg:0 6px 24px rgba(0,0,0,.16);
  --r:14px;
}
body{font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;}
.hide{display:none!important;}
input,button{font-family:inherit;}
.screen{min-height:100dvh;}

/* LOGIN */
#sLogin{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:linear-gradient(160deg,#FEF6E8 0%,#F0E4D8 100%);}
.login-card{background:var(--white);border-radius:22px;padding:30px 24px 24px;width:100%;max-width:360px;box-shadow:var(--sh-lg);text-align:center;}
.login-logo{font-size:52px;margin-bottom:4px;}
.login-title{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:3px;}
.login-sub{font-size:13px;color:var(--soft);margin-bottom:22px;line-height:1.5;}
.inp{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px 14px;font-size:15px;outline:none;transition:border-color .2s;background:#FAFAFA;margin-bottom:10px;}
.inp:focus{border-color:var(--red);background:var(--white);}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));color:var(--white);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;transition:transform .15s;box-shadow:0 4px 12px rgba(180,40,40,.3);}
.btn-primary:hover{transform:translateY(-1px);}
.btn-primary:active{transform:scale(.98);}
.login-err{font-size:12px;color:var(--red);min-height:18px;margin-top:4px;}
.teacher-link{font-size:12px;color:var(--soft);cursor:pointer;text-decoration:underline;margin-top:10px;display:inline-block;}

/* GAME HEADER */
#gameHeader{background:linear-gradient(135deg,var(--red),var(--red2));padding:10px 14px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(180,40,40,.3);}
.hdr-logo{font-size:15px;font-weight:900;color:var(--white);line-height:1.2;}
.hdr-logo small{display:block;font-size:10px;font-weight:600;opacity:.75;}
.hdr-gap{flex:1;}
.hdr-pill{background:rgba(255,255,255,.2);border-radius:99px;padding:4px 12px;color:var(--white);font-size:11px;font-weight:700;}
.hdr-score{background:var(--white);border-radius:99px;padding:4px 12px;color:var(--red);font-size:12px;font-weight:900;}

/* PROGRESS */
#progBar{background:var(--white);padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 0 var(--border);}
.prog-track{display:flex;gap:4px;}
.prog-seg{height:6px;border-radius:3px;background:var(--border);transition:all .35s;width:36px;}
.prog-seg.done{background:var(--green);}
.prog-seg.active{background:var(--red);box-shadow:0 0 0 2px rgba(217,64,64,.2);}
.prog-lbl{font-size:10px;font-weight:700;color:var(--soft);}
.timer{margin-left:auto;font-size:11px;font-weight:800;color:var(--text);background:var(--bg);border-radius:99px;padding:3px 10px;}

/* BACK BTN */
#backBtn{display:flex;align-items:center;gap:6px;margin:8px 14px 0;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;color:var(--soft);cursor:pointer;width:fit-content;transition:all .15s;}
#backBtn:hover{border-color:var(--red);color:var(--red);}

/* INSTR */
.instr{margin:8px 14px 0;background:var(--white);border-radius:var(--r);padding:10px 13px;display:flex;gap:9px;align-items:flex-start;box-shadow:var(--sh);border-left:4px solid var(--red);}
.instr .ii{font-size:16px;flex-shrink:0;margin-top:1px;}
.instr-t{font-size:12px;line-height:1.6;}
.instr-t strong{color:var(--red);}

/* SEC LABEL */
.sec-lbl{font-size:10px;font-weight:800;color:var(--soft);letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* TRAY */
#trayWrap{padding:10px 14px 0;}
#tray{background:var(--white);border-radius:var(--r);padding:9px;min-height:74px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;border:2px dashed var(--border);transition:border-color .2s,background .2s;box-shadow:var(--sh);}
#tray.drag-hi{border-color:var(--red);background:#FFF4F4;}
.tray-empty{font-size:12px;color:#C0B8C8;font-weight:700;margin:auto;}

/* ITEM */
.item{width:58px;height:58px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:grab;flex-shrink:0;background:linear-gradient(145deg,var(--item-hi),var(--item));box-shadow:0 3px 10px rgba(220,100,40,.32),inset 0 1px 0 rgba(255,255,255,.28);transition:transform .15s,box-shadow .15s,opacity .18s;user-select:none;touch-action:none;}
.item:hover{transform:translateY(-3px) scale(1.08);}
.item.dragging{opacity:.38;transform:scale(.9);}
.item .ie{font-size:22px;line-height:1;pointer-events:none;}
.item .in{font-size:9px;font-weight:700;color:var(--white);text-shadow:0 1px 3px rgba(0,0,0,.4);text-align:center;pointer-events:none;}

/* SHELVES */
#shelvesWrap{padding:10px 14px 24px;}
.sg{margin-bottom:14px;}
.sg-hd{font-size:11px;font-weight:800;color:var(--wood-dark);margin-bottom:7px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sg-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;}
.sg-note{font-size:10px;color:var(--soft);}
.shelf-cols{display:grid;gap:8px;}
.shelf-col-lbl{font-size:10px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.shelf-col-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;}
.shelf{background:var(--wood-shelf);border-radius:11px;border:2px solid var(--wood);padding:7px;min-height:78px;display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start;position:relative;transition:border-color .2s,background .2s;}
.shelf::after{content:'';position:absolute;bottom:-6px;left:7px;right:7px;height:7px;background:var(--wood-dark);border-radius:0 0 5px 5px;z-index:-1;}
.shelf.drag-hi{border-color:var(--green);background:#EEF9F3;}
.shelf.flash-ok{animation:flashOK .45s;}
.shelf.flash-err{animation:flashErr .4s;}
.shelf-hint{font-size:10px;color:#C0B0C8;font-weight:700;margin:auto;}

/* PLACED ITEM */
.pi{width:46px;height:46px;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:linear-gradient(145deg,var(--item-hi),var(--item));box-shadow:0 2px 6px rgba(0,0,0,.12),inset 0 1px 0 rgba(255,255,255,.22);position:relative;}
.pi .ie{font-size:17px;}
.pi .in{font-size:8px;font-weight:700;color:var(--white);text-shadow:0 1px 2px rgba(0,0,0,.35);text-align:center;}
/* wrong item gets red ring */
.pi.wrong{box-shadow:0 0 0 2px #D94040,0 2px 6px rgba(0,0,0,.12);}
.pi.wrong::after{content:'✗';position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:#D94040;border-radius:50%;font-size:8px;font-weight:900;color:white;display:flex;align-items:center;justify-content:center;line-height:14px;text-align:center;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(20,10,30,.6);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
.overlay.show{display:flex;}
.ov-box{background:var(--white);border-radius:22px;padding:26px 22px 20px;text-align:center;max-width:300px;width:92%;box-shadow:var(--sh-lg);animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
.ov-box .big{font-size:48px;margin-bottom:8px;}
.ov-box h2{font-size:19px;font-weight:900;margin-bottom:5px;}
.ov-box p{font-size:12px;color:var(--soft);line-height:1.65;margin-bottom:6px;white-space:pre-line;}
.ov-time{font-size:13px;font-weight:800;color:var(--red);margin-bottom:14px;}
.ov-btn{width:100%;background:linear-gradient(135deg,var(--red),var(--red2));color:var(--white);border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;transition:transform .15s;box-shadow:0 4px 12px rgba(180,40,40,.28);}
.ov-btn:hover{transform:scale(1.02);}
.ov-cancel{display:block;font-size:12px;color:var(--soft);cursor:pointer;text-decoration:underline;margin-top:10px;}

/* TOAST */
#toast{position:fixed;top:12px;left:50%;transform:translateX(-50%) translateY(-68px);white-space:nowrap;background:var(--white);border-radius:11px;padding:8px 16px;font-size:12px;font-weight:800;box-shadow:var(--sh-lg);transition:transform .28s cubic-bezier(.34,1.56,.64,1);z-index:2000;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--green);border:2px solid var(--green);}
#toast.err{color:var(--red);border:2px solid var(--red);}

/* TEACHER */
#sTeacher{background:var(--bg);}
.t-hdr{background:linear-gradient(135deg,#1E1628,#3A2860);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.t-hdr h1{font-size:15px;font-weight:900;color:var(--white);}
.t-hdr .badge{background:rgba(255,255,255,.15);border-radius:99px;padding:3px 10px;font-size:11px;color:var(--white);}
.t-exit{margin-left:auto;background:rgba(255,255,255,.18);border:none;border-radius:99px;padding:5px 12px;color:var(--white);font-size:11px;font-weight:700;cursor:pointer;}
.t-body{padding:14px;}
.t-card{background:var(--white);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.t-card-title{font-size:12px;font-weight:800;margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.t-card-title .t-actions{margin-left:auto;display:flex;gap:6px;}
.qr-wrap{display:flex;flex-direction:column;align-items:center;gap:9px;}
#qrcode{border-radius:10px;overflow:hidden;box-shadow:var(--sh);}
.qr-url{font-size:10px;color:var(--soft);word-break:break-all;text-align:center;max-width:220px;line-height:1.5;}
.qr-hint{font-size:11px;color:var(--soft);text-align:center;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.stat-box{background:var(--bg);border-radius:10px;padding:8px 4px;text-align:center;}
.stat-n{font-size:22px;font-weight:900;color:var(--red);line-height:1;}
.stat-l{font-size:9px;color:var(--soft);font-weight:700;margin-top:2px;}
.t-table{width:100%;border-collapse:collapse;font-size:11px;}
.t-table th{background:#F5F0FA;padding:7px 8px;text-align:left;font-weight:800;color:var(--soft);border-bottom:2px solid var(--border);}
.t-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.t-table tr:last-child td{border-bottom:none;}
.lv-bar{display:flex;gap:3px;}
.lv-s{width:20px;height:6px;border-radius:3px;background:var(--border);}
.lv-s.done{background:var(--green);}
.lv-s.cur{background:var(--red);}
.rank-medal{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:900;}
.r1{background:#FFD700;color:#6B4800;}
.r2{background:#C0C0C0;color:#3A3A3A;}
.r3{background:#CD7F32;color:#fff;}
.refresh-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;border:1.5px solid var(--border);background:transparent;cursor:pointer;color:var(--soft);transition:all .15s;}
.refresh-btn:hover{border-color:var(--red);color:var(--red);}
.del-btn{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;border:1.5px solid #FDDEDE;background:transparent;cursor:pointer;color:var(--red);transition:all .15s;white-space:nowrap;}
.del-btn:hover{background:#FDDEDE;}
.empty-row td{text-align:center;color:var(--soft);padding:16px;}

@keyframes flashOK{0%,100%{}45%{background:#C8EDDA;border-color:var(--green);}}
@keyframes flashErr{0%,100%{}35%,65%{background:#FDDEDE;border-color:var(--red);}}
@keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(110vh) rotate(900deg)}}
.confetti-p{position:fixed;border-radius:2px;animation:confettiFall ease forwards;pointer-events:none;z-index:3000;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="sLogin" class="screen">
  <div class="login-card">
    <div class="login-logo">🛒</div>
    <div class="login-title">小熊超市</div>
    <div class="login-sub">帮店长把乱掉的货架整理好！</div>
    <input class="inp" id="nameInp" placeholder="输入你的名字再开始" maxlength="8" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">开始游戏 →</button>
    <div class="login-err" id="loginErr"></div>
    <span class="teacher-link" onclick="showTlOv()">教师入口</span>
  </div>
</div>

<!-- GAME -->
<div id="sGame" class="screen hide">
  <div id="gameHeader">
    <div class="hdr-logo">🛒 小熊超市<small id="hdrName">—</small></div>
    <div class="hdr-gap"></div>
    <div class="hdr-pill" id="hdrLevel">第一关</div>
    <div class="hdr-score" id="hdrScore">⭐ 0</div>
  </div>
  <div id="progBar">
    <span class="prog-lbl">进度</span>
    <div class="prog-track">
      <div class="prog-seg active" id="ps0"></div>
      <div class="prog-seg" id="ps1"></div>
      <div class="prog-seg" id="ps2"></div>
    </div>
    <span class="prog-lbl" id="progStep">第1关 / 共3关</span>
    <div class="timer" id="timerEl">00:00</div>
  </div>
  <button id="backBtn" class="hide" onclick="goBack()">← 返回上一关</button>
  <div class="instr"><span class="ii">💡</span><div class="instr-t" id="instrT"></div></div>
  <div id="trayWrap">
    <div class="sec-lbl" style="margin-top:10px">待上架商品</div>
    <div id="tray"></div>
  </div>
  <div id="shelvesWrap"></div>
</div>

<!-- TEACHER -->
<div id="sTeacher" class="screen hide">
  <div class="t-hdr">
    <h1>📊 教师控制台</h1>
    <span class="badge">小熊超市</span>
    <button class="t-exit" onclick="exitTeacher()">退出</button>
  </div>
  <div class="t-body">
    <div class="t-card">
      <div class="t-card-title">📱 学生扫码入口</div>
      <div class="qr-wrap">
        <div id="qrcode"></div>
        <div class="qr-hint">学生用平板扫描二维码，填名字后开始游戏</div>
        <div class="qr-url" id="qrUrl"></div>
      </div>
    </div>
    <div class="t-card">
      <div class="t-card-title">
        🏆 完成排行榜（用时最短）
        <div class="t-actions">
          <button class="refresh-btn" onclick="refreshTeacher()">↻ 刷新</button>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-n" id="sTotal">0</div><div class="stat-l">已登录</div></div>
        <div class="stat-box"><div class="stat-n" id="sL1">0</div><div class="stat-l">第一关中</div></div>
        <div class="stat-box"><div class="stat-n" id="sL2">0</div><div class="stat-l">第二关中</div></div>
        <div class="stat-box"><div class="stat-n" id="sDone">0</div><div class="stat-l">已完成</div></div>
      </div>
      <table class="t-table">
        <thead><tr><th>名次</th><th>名字</th><th>得分</th><th>用时</th><th>操作</th></tr></thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
    <div class="t-card">
      <div class="t-card-title">
        📋 所有学生
        <div class="t-actions">
          <button class="del-btn" onclick="confirmDeleteAll()">清空全部记录</button>
        </div>
      </div>
      <table class="t-table">
        <thead><tr><th>名字</th><th>进度</th><th>得分</th><th>用时</th><th>操作</th></tr></thead>
        <tbody id="progBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- OVERLAYS -->
<div class="overlay" id="ovTeacher">
  <div class="ov-box">
    <div class="big">🔐</div>
    <h2 style="margin-bottom:14px">教师入口</h2>
    <input class="inp" id="pwInp" type="password" placeholder="输入教师密码"
      onkeydown="if(event.key==='Enter')checkPw()">
    <div class="login-err" id="pwErr"></div>
    <button class="ov-btn" style="margin-top:8px" onclick="checkPw()">进入教师端</button>
    <span class="ov-cancel" onclick="closeOv('ovTeacher')">取消</span>
  </div>
</div>
<div class="overlay" id="ovCel">
  <div class="ov-box">
    <div class="big" id="celEmoji"></div>
    <h2 id="celTitle"></h2>
    <p id="celSub"></p>
    <div class="ov-time" id="celTime"></div>
    <button class="ov-btn" id="celBtn"></button>
  </div>
</div>
<div class="overlay" id="ovConfirm">
  <div class="ov-box">
    <div class="big">⚠️</div>
    <h2 id="confirmTitle">确认删除？</h2>
    <p id="confirmMsg" style="margin-bottom:16px"></p>
    <button class="ov-btn" id="confirmOkBtn">确认删除</button>
    <span class="ov-cancel" onclick="closeOv('ovConfirm')">取消</span>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ──────────────────────────────────────────
const PW = '2024';

const ITEMS = [
  {id:'apple',     e:'🍎',n:'苹果',   c1:'食品',  c2:'水果',c3:null},
  {id:'banana',    e:'🍌',n:'香蕉',   c1:'食品',  c2:'水果',c3:null},
  {id:'grape',     e:'🍇',n:'葡萄',   c1:'食品',  c2:'水果',c3:null},
  {id:'orange',    e:'🍊',n:'橙子',   c1:'食品',  c2:'水果',c3:null},
  {id:'watermelon',e:'🍉',n:'西瓜',   c1:'食品',  c2:'水果',c3:null},
  {id:'carrot',    e:'🥕',n:'胡萝卜', c1:'食品',  c2:'蔬菜',c3:null},
  {id:'broccoli',  e:'🥦',n:'西兰花', c1:'食品',  c2:'蔬菜',c3:null},
  {id:'corn',      e:'🌽',n:'玉米',   c1:'食品',  c2:'蔬菜',c3:null},
  {id:'tomato',    e:'🍅',n:'番茄',   c1:'食品',  c2:'蔬菜',c3:null},
  {id:'mushroom',  e:'🍄',n:'蘑菇',   c1:'食品',  c2:'蔬菜',c3:null},
  {id:'cookie',    e:'🍪',n:'饼干',   c1:'食品',  c2:'零食',c3:null},
  {id:'candy',     e:'🍬',n:'糖果',   c1:'食品',  c2:'零食',c3:null},
  {id:'cake',      e:'🧁',n:'蛋糕',   c1:'食品',  c2:'零食',c3:null},
  {id:'chips',     e:'🥨',n:'薯片',   c1:'食品',  c2:'零食',c3:null},
  {id:'juice',     e:'🧃',n:'果汁',   c1:'食品',  c2:'零食',c3:null},
  {id:'soap',      e:'🧼',n:'香皂',   c1:'日用品',c2:'洗护',c3:null},
  {id:'toothbrush',e:'🪥',n:'牙刷',   c1:'日用品',c2:'洗护',c3:null},
  {id:'tissue',    e:'🧻',n:'纸巾',   c1:'日用品',c2:'洗护',c3:null},
  {id:'shampoo',   e:'🧴',n:'洗发水', c1:'日用品',c2:'洗护',c3:null},
  {id:'comb',      e:'🪮',n:'梳子',   c1:'日用品',c2:'洗护',c3:null},
  {id:'pencil',    e:'✏️',n:'铅笔',   c1:'日用品',c2:'文具',c3:null},
  {id:'scissors',  e:'✂️',n:'剪刀',   c1:'日用品',c2:'文具',c3:null},
  {id:'ruler',     e:'📏',n:'尺子',   c1:'日用品',c2:'文具',c3:null},
  {id:'notebook',  e:'📓',n:'本子',   c1:'日用品',c2:'文具',c3:null},
  {id:'crayon',    e:'🖍️',n:'蜡笔',   c1:'日用品',c2:'文具',c3:null},
  {id:'cube',      e:'🎲',n:'魔方',   c1:'玩具',  c2:'益智',c3:'单人'},
  {id:'puzzle',    e:'🧩',n:'拼图',   c1:'玩具',  c2:'益智',c3:'单人'},
  {id:'clay',      e:'🎨',n:'彩泥',   c1:'玩具',  c2:'益智',c3:'单人'},
  {id:'blocks',    e:'🧱',n:'积木',   c1:'玩具',  c2:'益智',c3:'单人'},
  {id:'top',       e:'🌀',n:'陀螺',   c1:'玩具',  c2:'运动',c3:'单人'},
  {id:'soccer',    e:'⚽',n:'足球',   c1:'玩具',  c2:'运动',c3:'多人'},
  {id:'chess',     e:'♟️',n:'象棋',   c1:'玩具',  c2:'益智',c3:'多人'},
  {id:'cards',     e:'🃏',n:'扑克',   c1:'玩具',  c2:'益智',c3:'多人'},
  {id:'frisbee',   e:'🥏',n:'飞盘',   c1:'玩具',  c2:'运动',c3:'多人'},
  {id:'rope',      e:'🪢',n:'跳绳',   c1:'玩具',  c2:'运动',c3:'多人'},
];

const LEVELS = [
  {
    n:1,badge:'第一关',
    instr:'把所有商品按 <strong>食品、日用品、玩具</strong> 分到对应货架！',
    items:()=>shuffle([...ITEMS]),
    key:i=>i.c1,
    layout:'flat',
    shelves:[
      {key:'食品',  lbl:'食品',  color:'#C87C1A'},
      {key:'日用品',lbl:'日用品',color:'#3470C8'},
      {key:'玩具',  lbl:'玩具',  color:'#6B44C8'},
    ],
    cel:{e:'🎊',t:'第一关完成！',s:'大分类搞定！\n下一关：每堆里再细分！',btn:'下一关 →'}
  },
  {
    n:2,badge:'第二关',
    instr:'每个大类再细分：食品→<strong>水果/蔬菜/零食</strong>，日用品→<strong>洗护/文具</strong>，玩具→<strong>运动/益智</strong>',
    items:()=>shuffle([...ITEMS]),
    key:i=>i.c2,
    layout:'grouped',
    groups:[
      {gkey:'食品',  glbl:'食品区',  gc:'#C87C1A',
       shelves:[{key:'水果',lbl:'水果',color:'#D43858'},{key:'蔬菜',lbl:'蔬菜',color:'#2E9E6B'},{key:'零食',lbl:'零食',color:'#C87C1A'}]},
      {gkey:'日用品',glbl:'日用品区',gc:'#3470C8',
       shelves:[{key:'洗护',lbl:'洗护',color:'#1E8A80'},{key:'文具',lbl:'文具',color:'#3470C8'}]},
      {gkey:'玩具',  glbl:'玩具区',  gc:'#6B44C8',
       shelves:[{key:'运动',lbl:'运动',color:'#C87C1A'},{key:'益智',lbl:'益智',color:'#6B44C8'}]},
    ],
    cel:{e:'🌟',t:'第二关完成！',s:'越分越细！\n最后一关：玩具区按推荐玩法再分！',btn:'最后一关 →'}
  },
  {
    n:3,badge:'第三关',
    instr:'把玩具按<strong>推荐玩法</strong>再分一次：推荐单人玩 还是 推荐多人玩？',
    items:()=>shuffle(ITEMS.filter(i=>i.c1==='玩具')),
    key:i=>i.c3,
    layout:'grouped',
    groups:[
      {gkey:'all',glbl:'玩具区 — 推荐玩法',gc:'#6B44C8',
       shelves:[{key:'单人',lbl:'推荐单人玩',color:'#D43858'},{key:'多人',lbl:'推荐多人玩',color:'#2E9E6B'}]},
    ],
    cel:{e:'🏆',t:'全部完成！',s:'三层分类全搞定！\n货架整整齐齐，顾客一眼找到！',btn:'🎉 再玩一次'}
  }
];

// ── STATE ──────────────────────────────────────────────
let sName='',lv=0,score=0;
let placed={};   // id -> shelfKey
let wrong={};    // id -> true (wrong placement)
let dragItem=null,dragClone=null,dragOX=0,dragOY=0;
let t0=0,lv0=0,lvTimes=[],timerIv=null,teacherIv=null;

// ── UTILS ──────────────────────────────────────────────
const $=id=>document.getElementById(id);
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function fmt(ms){if(ms==null)return '--';const s=0|ms/1000;return`${0|s/60}:${String(s%60).padStart(2,'0')}`;}
function show(id){$(id).classList.remove('hide');}
function hide(id){$(id).classList.add('hide');}
function closeOv(id){$(id).classList.remove('show');}

// ── STORAGE ────────────────────────────────────────────
async function saveMe(){
  const rec={name:sName,lv:lv+1,score,t0,done:lv===2?Date.now()-t0:null,lvTimes:[...lvTimes]};
  try{await window.storage.set('stu_'+sName,JSON.stringify(rec),true);}catch(e){}
}
async function getStudents(){
  try{
    const r=await window.storage.list('stu_',true);
    const out=[];
    for(const k of(r?.keys||[])){
      try{const v=await window.storage.get(k,true);if(v)out.push(JSON.parse(v.value));}catch(e){}
    }
    return out;
  }catch(e){return[];}
}
async function deleteStudent(name){
  try{await window.storage.delete('stu_'+name,true);}catch(e){}
}
async function deleteAllStudents(){
  try{
    const r=await window.storage.list('stu_',true);
    for(const k of(r?.keys||[])){
      try{await window.storage.delete(k,true);}catch(e){}
    }
  }catch(e){}
}

// ── LOGIN ──────────────────────────────────────────────
async function doLogin(){
  const name=$('nameInp').value.trim();
  if(!name){$('loginErr').textContent='请输入你的名字！';return;}
  sName=name;lv=0;score=0;placed={};wrong={};lvTimes=[];
  t0=Date.now();lv0=Date.now();
  $('hdrName').textContent=name;
  await saveMe();
  hide('sLogin');show('sGame');
  startTimer();startLevel();
}
function showTlOv(){$('pwInp').value='';$('pwErr').textContent='';$('ovTeacher').classList.add('show');}
function checkPw(){
  if($('pwInp').value===PW){closeOv('ovTeacher');hide('sLogin');show('sTeacher');initTeacher();}
  else $('pwErr').textContent='密码不对，再试试！';
}
function exitTeacher(){clearInterval(teacherIv);hide('sTeacher');show('sLogin');}

// ── TIMER ──────────────────────────────────────────────
function startTimer(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>$('timerEl').textContent=fmt(Date.now()-t0),1000);
}

// ── LEVEL ──────────────────────────────────────────────
function startLevel(){
  placed={};wrong={};
  const cfg=LEVELS[lv];
  $('hdrLevel').textContent=cfg.badge;
  $('instrT').innerHTML=cfg.instr;
  $('progStep').textContent=`第${cfg.n}关 / 共3关`;
  for(let i=0;i<3;i++){
    const d=$('ps'+i);
    d.className='prog-seg'+(i<lv?' done':i===lv?' active':'');
  }
  // show back btn from level 2 onwards
  lv>0?show('backBtn'):hide('backBtn');
  renderTray();renderShelves();
}

function goBack(){
  if(lv===0)return;
  clearInterval(timerIv);
  lv--;
  // restore timer to approximate
  lv0=Date.now();
  lvTimes.pop();
  startTimer();
  startLevel();
}

// ── TRAY ──────────────────────────────────────────────
function renderTray(){
  const t=$('tray');t.innerHTML='';
  const items=LEVELS[lv].items().filter(i=>!placed[i.id]);
  if(!items.length){t.innerHTML='<div class="tray-empty">✅ 全部上架啦！</div>';return;}
  items.forEach(i=>t.appendChild(mkItem(i)));
  t.ondragover=e=>{e.preventDefault();t.classList.add('drag-hi');};
  t.ondragleave=()=>t.classList.remove('drag-hi');
  t.ondrop=e=>{
    e.preventDefault();t.classList.remove('drag-hi');
    if(dragItem&&placed[dragItem.id]){
      delete placed[dragItem.id];delete wrong[dragItem.id];
      renderTray();renderShelves();
    }
  };
}

function mkItem(item){
  const el=document.createElement('div');
  el.className='item';el.draggable=true;el.dataset.id=item.id;
  el.innerHTML=`<span class="ie">${item.e}</span><span class="in">${item.n}</span>`;
  el.ondragstart=()=>{dragItem=item;setTimeout(()=>el.classList.add('dragging'),0);};
  el.ondragend=()=>el.classList.remove('dragging');
  el.addEventListener('touchstart',e=>{
    dragItem=item;
    const t=e.touches[0],r=el.getBoundingClientRect();
    dragOX=t.clientX-r.left;dragOY=t.clientY-r.top;
    dragClone=el.cloneNode(true);
    Object.assign(dragClone.style,{position:'fixed',width:'58px',height:'58px',borderRadius:'12px',
      zIndex:'2000',pointerEvents:'none',opacity:'.9',transform:'scale(1.1) rotate(3deg)',transition:'none',
      left:(t.clientX-dragOX)+'px',top:(t.clientY-dragOY)+'px'});
    document.body.appendChild(dragClone);
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    if(!dragClone)return;
    const t=e.touches[0];
    dragClone.style.left=(t.clientX-dragOX)+'px';
    dragClone.style.top=(t.clientY-dragOY)+'px';
  },{passive:true});
  el.addEventListener('touchend',e=>{
    dragClone?.remove();dragClone=null;
    const t=e.changedTouches[0];
    const hit=document.elementFromPoint(t.clientX,t.clientY);
    const sh=hit?.closest('[data-shelf]');
    if(sh&&dragItem)tryDrop(dragItem,sh.dataset.shelf);
    dragItem=null;
  });
  return el;
}

// ── SHELVES ───────────────────────────────────────────
function renderShelves(){
  const wrap=$('shelvesWrap');wrap.innerHTML='';
  const cfg=LEVELS[lv];
  if(cfg.layout==='flat'){
    const sl=document.createElement('div');
    sl.className='sec-lbl';sl.textContent='货架区';
    wrap.appendChild(sl);
    cfg.shelves.forEach(s=>{
      const col=document.createElement('div');
      col.style.marginBottom='10px';
      col.innerHTML=`<div class="shelf-col-lbl"><span class="shelf-col-badge" style="background:${s.color}1A;color:${s.color}">${s.lbl}</span></div>`;
      col.appendChild(mkShelf(s.key,s.color));
      wrap.appendChild(col);
    });
  } else {
    cfg.groups.forEach(g=>{
      const div=document.createElement('div');div.className='sg';
      const note=lv===1?'<span class="sg-note">（接着第一关继续分 ↓）</span>':'';
      div.innerHTML=`<div class="sg-hd"><span class="sg-badge" style="background:${g.gc}1A;color:${g.gc}">${g.glbl}</span>${note}</div>`;
      const grid=document.createElement('div');
      grid.className='shelf-cols';
      grid.style.gridTemplateColumns=`repeat(${g.shelves.length},1fr)`;
      g.shelves.forEach(s=>{
        const col=document.createElement('div');
        col.innerHTML=`<div class="shelf-col-lbl"><span class="shelf-col-badge" style="background:${s.color}1A;color:${s.color}">${s.lbl}</span></div>`;
        col.appendChild(mkShelf(s.key,s.color));
        grid.appendChild(col);
      });
      div.appendChild(grid);wrap.appendChild(div);
    });
  }
}

function mkShelf(key,color){
  const sh=document.createElement('div');
  sh.className='shelf';sh.dataset.shelf=key;
  sh.style.borderColor=color+'66';
  const items=ITEMS.filter(i=>placed[i.id]===key);
  if(!items.length)sh.innerHTML='<div class="shelf-hint">拖到这里</div>';
  else items.forEach(i=>{
    const p=document.createElement('div');
    p.className='pi'+(wrong[i.id]?' wrong':'');
    p.innerHTML=`<span class="ie">${i.e}</span><span class="in">${i.n}</span>`;
    sh.appendChild(p);
  });
  sh.ondragover=e=>{e.preventDefault();sh.classList.add('drag-hi');};
  sh.ondragleave=()=>sh.classList.remove('drag-hi');
  sh.ondrop=e=>{e.preventDefault();sh.classList.remove('drag-hi');if(dragItem)tryDrop(dragItem,key);};
  return sh;
}

// ── DROP LOGIC ─────────────────────────────────────────
function tryDrop(item,key){
  const correct=LEVELS[lv].key(item)===key;
  // always place it
  placed[item.id]=key;
  if(correct){
    delete wrong[item.id];
    score+=10;
    $('hdrScore').textContent=`⭐ ${score}`;
    toast(`✅ ${item.n} 放对了！+10分`,'ok');
    flash(key,'flash-ok');
  } else {
    wrong[item.id]=true;
    score=Math.max(0,score-5);
    $('hdrScore').textContent=`⭐ ${score}`;
    toast(`❌ ${item.n} 放错了！-5分，可以拖回来重放`,'err');
    flash(key,'flash-err');
  }
  renderTray();renderShelves();
  // check: all placed AND none wrong
  const allItems=LEVELS[lv].items();
  const allPlaced=allItems.every(i=>placed[i.id]);
  const anyWrong=allItems.some(i=>wrong[i.id]);
  if(allPlaced&&!anyWrong) setTimeout(celebrate,420);
}

function flash(key,cls){
  const el=document.querySelector(`[data-shelf="${key}"]`);
  if(!el)return;
  el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls);
  setTimeout(()=>el.classList.remove(cls),500);
}

// ── CELEBRATE ─────────────────────────────────────────
async function celebrate(){
  const lt=Date.now()-lv0;lvTimes.push(lt);
  const total=Date.now()-t0;
  const cfg=LEVELS[lv];const last=lv===2;
  $('celEmoji').textContent=cfg.cel.e;
  $('celTitle').textContent=cfg.cel.t;
  $('celSub').textContent=cfg.cel.s;
  $('celTime').textContent=last?`总用时：${fmt(total)}  |  得分：${score}分`:`本关用时：${fmt(lt)}`;
  $('celBtn').textContent=cfg.cel.btn;
  $('ovCel').classList.add('show');
  if(last)clearInterval(timerIv);
  await saveMe();
  confetti();
}
$('celBtn').addEventListener('click',()=>{
  closeOv('ovCel');
  if(lv<2){lv++;lv0=Date.now();startLevel();}
  else{lv=0;score=0;placed={};wrong={};lvTimes=[];t0=Date.now();lv0=Date.now();startTimer();startLevel();}
});

// ── TOAST ─────────────────────────────────────────────
let toastTv;
function toast(msg,type){
  const el=$('toast');el.textContent=msg;el.className=`toast ${type} show`;
  clearTimeout(toastTv);toastTv=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── CONFETTI ──────────────────────────────────────────
function confetti(){
  const cols=['#D94040','#2E9E6B','#3470C8','#C87C1A','#6B44C8','#1E8A80'];
  for(let i=0;i<44;i++){
    const el=document.createElement('div');el.className='confetti-p';
    const sz=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;width:${sz}px;height:${sz}px;`+
      `background:${cols[i%cols.length]};animation-delay:${(Math.random()*.9).toFixed(2)}s;`+
      `animation-duration:${(1.5+Math.random()*.8).toFixed(2)}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2900);
  }
}

// ── TEACHER ───────────────────────────────────────────
function initTeacher(){
  const url=location.href;
  $('qrUrl').textContent=url;
  $('qrcode').innerHTML='';
  try{
    new QRCode($('qrcode'),{text:url,width:180,height:180,
      colorDark:'#1E1628',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  }catch(e){
    $('qrcode').innerHTML='<div style="padding:16px;font-size:12px;color:#888;text-align:center">请在公网部署后使用二维码功能</div>';
  }
  refreshTeacher();
  teacherIv=setInterval(refreshTeacher,5000);
}

async function refreshTeacher(){
  const students=await getStudents();
  $('sTotal').textContent=students.length;
  $('sL1').textContent=students.filter(s=>s.lv===1).length;
  $('sL2').textContent=students.filter(s=>s.lv===2).length;
  $('sDone').textContent=students.filter(s=>s.done!=null).length;

  // rank table — completed students sorted by time
  const rb=$('rankBody');rb.innerHTML='';
  const fin=[...students].filter(s=>s.done!=null).sort((a,b)=>a.done-b.done);
  if(!fin.length){rb.innerHTML='<tr class="empty-row"><td colspan="5">还没有同学完成三关</td></tr>';}
  else fin.forEach((s,i)=>{
    const medal=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rank=medal?`<span class="rank-medal ${medal}">${i+1}</span>`:`<span style="font-size:11px;color:var(--soft)">${i+1}</span>`;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${rank}</td><td><strong>${s.name}</strong></td><td>${s.score}分</td><td>${fmt(s.done)}</td>
      <td><button class="del-btn" onclick="confirmDelete('${s.name}')">删除</button></td>`;
    rb.appendChild(tr);
  });

  // all students table
  const pb=$('progBody');pb.innerHTML='';
  const sorted=[...students].sort((a,b)=>(b.lv-a.lv)||(b.score-a.score));
  if(!sorted.length){pb.innerHTML='<tr class="empty-row"><td colspan="5">还没有学生登录</td></tr>';return;}
  sorted.forEach(s=>{
    const dots=[0,1,2].map(i=>`<div class="lv-s${i<s.lv?' done':i===s.lv-1?' cur':''}"></div>`).join('');
    const elapsed=s.done!=null?fmt(s.done):fmt(Date.now()-s.t0)+' ⏱';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><strong>${s.name}</strong></td><td><div class="lv-bar">${dots}</div></td>
      <td>${s.score}分</td><td>${elapsed}</td>
      <td><button class="del-btn" onclick="confirmDelete('${s.name}')">删除</button></td>`;
    pb.appendChild(tr);
  });
}

function confirmDelete(name){
  $('confirmTitle').textContent='删除记录';
  $('confirmMsg').textContent=`确定删除「${name}」的游戏记录吗？`;
  $('confirmOkBtn').onclick=async()=>{
    await deleteStudent(name);closeOv('ovConfirm');refreshTeacher();
    toast(`已删除 ${name} 的记录`,'ok');
  };
  $('ovConfirm').classList.add('show');
}

function confirmDeleteAll(){
  $('confirmTitle').textContent='清空全部记录';
  $('confirmMsg').textContent='确定清空所有学生的记录吗？此操作不可恢复！';
  $('confirmOkBtn').onclick=async()=>{
    await deleteAllStudents();closeOv('ovConfirm');refreshTeacher();
    toast('已清空全部记录','ok');
  };
  $('ovConfirm').classList.add('show');
}
